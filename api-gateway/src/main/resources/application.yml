server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: your-256-bit-base64-encoded-secret-key-must-be-at-least-256-bits-long
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.milkdelivery.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
