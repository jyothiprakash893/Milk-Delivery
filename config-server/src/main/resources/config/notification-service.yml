server:
  port: 8086

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your_twilio_account_sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your_twilio_auth_token}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}

sendgrid:
  api-key: ${SENDGRID_API_KEY:your_sendgrid_api_key}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@milkdelivery.com}
  from-name: Milk Delivery

notification:
  sms:
    enabled: true
  email:
    enabled: true
  push:
    enabled: false

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
