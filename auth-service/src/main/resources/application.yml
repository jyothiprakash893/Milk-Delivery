server:
  port: 8091

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/users_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: jp893
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: profile, email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
            user-name-attribute: email

app:
  oauth2:
    redirect-uri: http://localhost:3000/oauth/callback

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

springdoc:
  api-docs:
    path: /api/auth/v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  access-secret: dGhpc0lzQVZlcnlMb25nQmFzZTY0RW5jb2RlZFNlY3JldEtleUZvckFjY2Vzc1Rva2VuTW9yZVRoYW4yNTZCaXRz
  refresh-secret: dGhpc0lzQW5vdGhlclZlcnlMb25nQmFzZTY0RW5jb2RlZFNlY3JldEtleUZvclJlZnJlc2hUb2tlbk1vcmVUaGFuMjU2Qml0cw==
  access-expiration: 900000
  refresh-expiration: 604800000

resilience4j:
  circuitbreaker:
    instances:
      customerService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      customerService:
        max-attempts: 3
        wait-duration: 500ms
  bulkhead:
    instances:
      customerService:
        max-concurrent-calls: 10
        max-wait-duration: 500ms
